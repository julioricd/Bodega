<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Offloading Tandem — VLCC × FPSO Peregrino</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #06222f;
        font-family: 'Space Grotesk', sans-serif;
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
      }
      #game { display: block; width: 100vw; height: 100vh; }
      .touch-btn {
        position: fixed;
        height: 52px;
        min-width: 52px;
        padding: 0 10px;
        border-radius: 26px;
        border: 2px solid rgba(255, 255, 255, 0.45);
        background: rgba(8, 32, 48, 0.55);
        color: #fff;
        font-size: 20px;
        font-family: 'Space Grotesk', sans-serif;
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 10;
        touch-action: none;
      }
      .touch-btn small { font-size: 11px; letter-spacing: 0.04em; }
      .touch-btn:active { background: rgba(255, 255, 255, 0.25); }
      @media (pointer: coarse) { .touch-btn { display: flex; } }
      /* leme — canto inferior esquerdo */
      #t-rud-port { left: 16px;  bottom: 20px; }
      #t-rud-mid  { left: 80px;  bottom: 20px; }
      #t-rud-stbd { left: 144px; bottom: 20px; }
      /* telégrafo — canto inferior direito */
      #t-tel-up   { right: 16px; bottom: 84px; }
      #t-tel-down { right: 16px; bottom: 20px; }
      /* ações — centro inferior */
      #t-vhf      { left: 50%; bottom: 20px; transform: translateX(-148px); }
      #t-action   { left: 50%; bottom: 20px; transform: translateX(-78px); }
      #t-tug      { left: 50%; bottom: 20px; transform: translateX(8px); }
      #t-push-pt  { left: 50%; bottom: 20px; transform: translateX(78px); }
      #t-push-sb  { left: 50%; bottom: 20px; transform: translateX(138px); }
    </style>
  </head>
  <body>
    <script>
      // Mostra na tela apenas erros REAIS de script (ignora falha de fonte/recurso externo)
      function vlccShowError(text) {
        var el = document.getElementById('jserr');
        if (!el) {
          el = document.createElement('div');
          el.id = 'jserr';
          el.style.cssText = 'position:fixed;top:8px;left:8px;right:8px;z-index:99;' +
            'background:#7a1f1f;color:#fff;font:13px monospace;padding:10px;' +
            'border-radius:8px;white-space:pre-wrap;';
          el.onclick = function () { el.remove(); };
          document.body.appendChild(el);
        }
        el.textContent = text + '\n(toque aqui para fechar)';
      }
      window.addEventListener('error', function (e) {
        if (!e.message) return; // falha de recurso externo — o jogo segue normal
        vlccShowError('Erro no jogo: ' + e.message);
      });
      // Vigia de carregamento: se o código não rodar, diagnostica a causa exata
      var vlccTries = 0;
      var vlccTimer = setInterval(function () {
        if (window.__vlccOk) {
          clearInterval(vlccTimer);
          var el = document.getElementById('jserr');
          if (el) el.remove();
          return;
        }
        vlccTries++;
        if (vlccTries < 6) return; // dá 12 s (conexões lentas / versão legada)
        clearInterval(vlccTimer);
        var diag = [];
        var temModulo = 'noModule' in document.createElement('script');
        if (!temModulo) diag.push('navegador sem suporte a JavaScript moderno');
        var s = document.querySelector('script[type="module"]');
        var src = s && (s.src || s.getAttribute('src'));
        if (src) {
          try {
            var x = new XMLHttpRequest();
            x.open('GET', src, false);
            x.send();
            diag.push('arquivo do jogo: HTTP ' + x.status + ' (' +
              (x.responseText ? x.responseText.length : 0) + ' bytes)');
          } catch (err) {
            diag.push('falha de rede ao baixar o jogo: ' + err);
          }
        } else {
          diag.push('script do jogo não encontrado no HTML');
        }
        vlccShowError('O jogo não carregou.\nDiagnóstico: ' + diag.join(' · ') +
          '\nEnvie esta mensagem para o desenvolvedor.');
      }, 2000);
    </script>
    <canvas id="game"></canvas>
    <button class="touch-btn" id="t-rud-port">◀</button>
    <button class="touch-btn" id="t-rud-mid">⊙</button>
    <button class="touch-btn" id="t-rud-stbd">▶</button>
    <button class="touch-btn" id="t-tel-up">▲</button>
    <button class="touch-btn" id="t-tel-down">▼</button>
    <button class="touch-btn" id="t-vhf"><small>VHF</small></button>
    <button class="touch-btn" id="t-action"><small>AÇÃO</small></button>
    <button class="touch-btn" id="t-tug"><small>REB</small></button>
    <button class="touch-btn" id="t-push-pt"><small>◁P</small></button>
    <button class="touch-btn" id="t-push-sb"><small>P▷</small></button>
    <script type="module" src="/vlcc/main.ts"></script>
  </body>
</html>
